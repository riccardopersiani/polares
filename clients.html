<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Clients - polares.web3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./mystyle.css" />
    <link rel="icon" href="favicon.ico?v=3" sizes="any" />
  </head>
  <body>
    <header>
      <img
        src="images/logo.svg"
        alt="Logo"
        style="height: 200px; margin-top: -20px; margin-bottom: -50px"
      />
      <p class="tagline">minimal design for maximal security</p>
      <nav>
        <ul>
          <li><a href="index.html">home</a></li>
          <li><a href="blog.html">blog</a></li>
          <li><a href="clients.html">clients</a></li>
        </ul>
      </nav>
    </header>

    <main class="clients-main">
      <section>
        <h2 class="client-heading">clients</h2>

        <div class="client-logos">
          <div class="client-logo-frame">
            <img
              src="images/ssv.svg"
              alt="SSV Network"
              class="client-logo client-logo--ssv"
            />
          </div>
          <div class="client-logo-frame">
            <img
              src="images/dewiz.svg"
              alt="Dewiz"
              class="client-logo client-logo--dewiz"
            />
          </div>
          <div class="client-logo-frame">
            <img
              src="images/sky-ecosystem.svg"
              alt="Sky Ecosystem"
              class="client-logo client-logo--sky"
            />
          </div>
          <div class="client-logo-frame client-logo-with-label">
            <img
              src="images/makerdao.svg"
              alt="MakerDAO"
              class="client-logo client-logo--makerdao"
            />
            <p>MakerDAO</p>
          </div>
          <div class="client-logo-frame">
            <img
              src="images/token.webp"
              alt="Token.com"
              class="client-logo client-logo--token"
            />
          </div>
          <div class="client-logo-frame">
            <img
              src="images/monolith.svg"
              alt="Monolith"
              class="client-logo client-logo--monolith"
            />
          </div>
          <div class="client-logo-frame">
            <img
              src="images/pnetwork.png"
              alt="pNetwork"
              class="client-logo client-logo--pnetwork"
            />
          </div>
          <div class="client-logo-frame client-logo-with-label">
            <img
              src="images/oraclize.png"
              alt="Oraclize / Provable Things"
              class="client-logo client-logo--oraclize"
            />
            <p>Oraclize</p>
          </div>
          <div class="client-logo-frame">
            <img
              src="images/vetrya.png"
              alt="Vetrya"
              class="client-logo client-logo--vetrya"
            />
          </div>
          <div class="client-logo-frame">
            <img
              src="images/reinvest.svg"
              alt="Reinvest"
              class="client-logo client-logo--reinvest"
            />
          </div>
          <div class="client-logo-frame">
            <img
              src="images/wide.svg"
              alt="WIDE"
              class="client-logo client-logo--wide"
            />
          </div>
          <div class="client-logo-frame">
            <img
              src="images/explus.svg"
              alt="Explus"
              class="client-logo client-logo--explus"
            />
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>no analytics. no cookies. no noise.</p>
    </footer>
  </body>
</html>
